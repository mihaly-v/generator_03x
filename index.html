<!DOCTYPE html>
<!-- saved from url=(0031)https://mihaly-v.github.io/tst/ -->
<html lang="ja"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FFXIV CHARACTER CARD GENERATOR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Meow+Script&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Black+Han+Sans&family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400..900&family=Dela+Gothic+One&family=Gasoek+One&family=Hachi+Maru+Pop&family=Major+Mono+Display&family=Montserrat:wght@100..900&family=Notable&family=Noto+Sans+JP&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-title" id="lblHeaderTitle">FFXIV CHARACTER CARD GENERATOR</div>
        <div class="lang-switcher">
            <button id="btnLangJP" class="active">
                <span class="lang-full">JAPANESE</span>
                <span class="lang-short">JP</span>
            </button>

            <button id="btnLangEN">
                <span class="lang-full">English</span>
                <span class="lang-short">EN</span>
            </button>
        </div>
    </header>

    <div class="center-wrapper">
        <div class="main-container">
            
            <div class="control-panel">
                <h3 class="section-title">File :</h3>
                <div class="form-group">
                    <label id="lblBgImage">背景画像アップロード</label>
                    <label class="custom-file-upload">
                        <input type="file" id="bgImage" accept="image/*">
                        <span id="file-upload-text">SELECT IMAGE FILE_</span>
                    </label>
                </div>
                <h3 class="section-title">Name :</h3>
                <div class="form-group">
                    <label id="lblCharName" for="charName">名前 (キャラクター名)</label>
                    <div class="name-input-container">
                        <input type="text" id="charName" value="" placeholder="ｱﾙﾌｧﾍﾞｯﾄがｵｽｽﾒです！">
                        <select id="textFontName">
                            <option class="font-orbitron" value="'Orbitron', sans-serif" selected>Orbitron</option>
                            <option class="font-cinzel" value="'Cinzel', serif">Cinzel</option>
                            <option class="font-cinzeldec" value="'Cinzel Decorative', serif">Cinzel Decorative</option>
                            <option class="font-montserrat" value="'Montserrat', sans-serif">Montserrat</option>
                            <option class="font-notojp" value="'Noto Sans JP', sans-serif">Noto Sans JP</option>
                            <option class="font-audiowide" value="'Audiowide', sans-serif">Audiowide</option>
                            <option class="font-blackhan" value="'Black Han Sans', sans-serif">Black Han Sans</option>
                            <option class="font-notable" value="'Notable', sans-serif">Notable</option>
                            <option class="font-gasoek" value="'Gasoek One', sans-serif">Gasoek One</option>
                            <option class="font-hachimaru" value="'Hachi Maru Pop', sans-serif">Hachi Maru Pop</option>
                            <option class="font-delagothic" value="'Dela Gothic One', sans-serif">Dela Gothic One</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label id="lblXID" for="xTwitterID">X (Twitter) @ユーザーID</label>
                    <input type="text" id="xTwitterID" value="" placeholder="@無しでもOK！ (QRコードに変換されます)">
                </div>

                

                <h3 class="section-title">Card Style :</h3>
                <div class="flex-row">
                    <div class="form-group">
                        <label id="lblOrientation">// カードの向き</label>
                        <div class="flex-row" style="gap:4px; margin-top:2px;">                        
                            <label class="radio-label"><input type="radio" name="cardOrientation" value="vertical" checked=""><span id="optVert">縦型</span></label>
                            <label class="radio-label"><input type="radio" name="cardOrientation" value="horizontal"><span id="optHoriz">横型</span></label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label id="lblPattern">// パターン</label>
                        <div class="flex-row" style="gap:4px; margin-top:2px;">
                            <label class="radio-label"><input type="radio" name="layoutPattern" value="A" checked=""><span>A</span></label>
                            <label class="radio-label"><input type="radio" name="layoutPattern" value="B"><span>B</span></label>
                        </div>
                    </div>
                </div>
                <div class="flex-row">
                    <div class="form-group">
                        <label id="lblMask">// マスク</label>
                        <div class="flex-row" style="gap:4px; margin-top:2px;">
                            <label class="radio-label"><input type="radio" name="layoutMask" value="off" checked=""><span>オフ</span></label>
                            <label class="radio-label"><input type="radio" name="layoutMask" value="on"><span>オン</span></label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label id="lblMaskPattern">// マスクパターン</label>
                        <div class="flex-row" style="gap:4px; margin-top:2px;">
                            <label class="radio-label"><input type="radio" name="layoutMaskPattern" value="mask-A.jpg" checked=""><span>A</span></label>
                            <label class="radio-label"><input type="radio" name="layoutMaskPattern" value="mask-B.jpg"><span>B</span></label>
                            <label class="radio-label"><input type="radio" name="layoutMaskPattern" value="mask-C.jpg"><span>C</span></label>
                        </div>
                    </div>
                </div>

                

                <h3 class="section-title">Colors :</h3>
                <div class="flex-row">
                    <div class="form-group">
                        <label id="lblCol1">メインカラー:</label>
                        <input type="color" id="themeColorPicker" value="#00f0ff">
                    </div>
                    <div class="form-group">
                        <label id="lblCol2">サブカラー:</label>
                        <input type="color" id="themeColorPicker2" value="#ff007f">
                    </div>
                </div>

                <div class="form-group">
                    <label id="lblColors">テーマプリセット</label>
                    <div class="palette-container" id="paletteContainer"><button type="button" class="palette-btn" title="CYAN"><div class="palette-preview"><div class="palette-color" style="background-color: rgb(0, 240, 255);"></div><div class="palette-color" style="background-color: rgb(255, 0, 127);"></div></div><span class="palette-label">CYAN</span></button><button type="button" class="palette-btn" title="SOL_9"><div class="palette-preview"><div class="palette-color" style="background-color: rgb(255, 0, 160);"></div><div class="palette-color" style="background-color: rgb(0, 240, 255);"></div></div><span class="palette-label">SOL_9</span></button><button type="button" class="palette-btn" title="TOKYO"><div class="palette-preview"><div class="palette-color" style="background-color: rgb(153, 0, 255);"></div><div class="palette-color" style="background-color: rgb(0, 255, 102);"></div></div><span class="palette-label">TOKYO</span></button><button type="button" class="palette-btn" title="MATRIX"><div class="palette-preview"><div class="palette-color" style="background-color: rgb(51, 255, 51);"></div><div class="palette-color" style="background-color: rgb(255, 153, 0);"></div></div><span class="palette-label">MATRIX</span></button><button type="button" class="palette-btn" title="GOLD"><div class="palette-preview"><div class="palette-color" style="background-color: rgb(255, 170, 0);"></div><div class="palette-color" style="background-color: rgb(0, 229, 255);"></div></div><span class="palette-label">GOLD</span></button><button type="button" class="palette-btn" title="VIOLET"><div class="palette-preview"><div class="palette-color" style="background-color: rgb(213, 0, 249);"></div><div class="palette-color" style="background-color: rgb(255, 255, 0);"></div></div><span class="palette-label">VIOLET</span></button><button type="button" class="palette-btn" title="CRIMSN"><div class="palette-preview"><div class="palette-color" style="background-color: rgb(255, 0, 85);"></div><div class="palette-color" style="background-color: rgb(0, 255, 255);"></div></div><span class="palette-label">CRIMSN</span></button><button type="button" class="palette-btn" title="LIGHT"><div class="palette-preview"><div class="palette-color" style="background-color: rgb(112, 120, 128);"></div><div class="palette-color" style="background-color: rgb(19, 22, 25);"></div></div><span class="palette-label">LIGHT</span></button></div>
                </div>
                <h3 class="section-title">Shadows :</h3>
                <div class="form-group" >
                    <label id="lblShadow">文字や要素の影：</label>
                    <div class="flex-row">
                        <label  class="radio-label"><input type="radio" name="textShadow" value="off" checked><span id="lblShadowOff">オフ</span></label>
                        <label  class="radio-label"><input type="radio" name="textShadow" value="on"><span id="lblShadowOn">オン</span></label>
                    </div>
                    
                </div>
                <div class="flex-row">
                    <div class="form-group">
                        <label id="lblShadowCol">影の色 :</label>
                        <input type="color" id="shadowColorPicker" value="#323232">
                    </div>
                    <div class="form-group">
                        <label id="lblAplha" for="alphaSlider">透明度 (Alpha):</label>
                        <div class="alphaWrap">
                            <input type="range" id="alphaSlider" min="0" max="1" step="0.01" value="0.5">
                            <span id="alphaValue">0.5</span>
                        </div>
                        <!-- <label class="radio-label"><input type="radio" name="textShadowColor" value="black" checked><span>黒</span></label>
                        <label class="radio-label"><input type="radio" name="textShadowColor" value="white"><span>白</span></label> -->
                    </div>
                </div>

                <h3 class="section-title">Status Data :</h3>
                <div class="flex-row">
                    <div class="form-group">
                        <label id="lblAffiliation">ワールド (DC / WORLD)</label>
                        <div class="flex-row" style="gap:4px;">
                            <select id="dcSelect">
                                <option value="" selected="">- DC -</option>
                                <option value="Secret">Secret</option>

                                <optgroup label="JP">
                                    <option value="Elemental">Elemental</option>
                                    <option value="Gaia">Gaia</option>
                                    <option value="Mana">Mana</option>
                                    <option value="Meteor">Meteor</option>
                                </optgroup>

                                <optgroup label="NA">
                                    <option value="Aether">Aether</option>
                                    <option value="Crystal">Crystal</option>
                                    <option value="Dynamis">Dynamis</option>
                                    <option value="Primal">Primal</option>
                                </optgroup>

                                <optgroup label="EU">
                                    <option value="Chaos">Chaos</option>
                                    <option value="Light">Light</option>
                                </optgroup>

                                <optgroup label="OC">
                                    <option value="Materia">Materia</option>
                                </optgroup>

                                <optgroup label="KR">
                                    <option value="Korea">Korea</option>
                                </optgroup>
                            </select>
                            <select id="worldSelect">
                                <option value="" selected="">- -</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label id="lblMainJob" for="mainJob">メインジョブ</label>
                        <select id="mainJob"><optgroup label="タンク"><option value="ナイト">ナイト (PLD)</option><option value="戦士">戦士 (WAR)</option><option value="暗黒騎士">暗黒騎士 (DRK)</option><option value="ガンブレイカー">ガンブレイカー (GNB)</option></optgroup><optgroup label="ヒーラー"><option value="白魔道士">白魔道士 (WHM)</option><option value="学者">学者 (SCH)</option><option value="占星術師">占星術師 (AST)</option><option value="賢者">賢者 (SGE)</option></optgroup><optgroup label="近接"><option value="モンク">モンク (MNK)</option><option value="竜騎士">竜騎士 (DRG)</option><option value="忍者">忍者 (NIN)</option><option value="侍">侍 (SAM)</option><option value="リーパー">リーパー (RPR)</option><option value="ヴァイパー">ヴァイパー (VPR)</option></optgroup><optgroup label="遠隔物理"><option value="吟遊詩人">吟遊詩人 (BRD)</option><option value="機工士">機工士 (MCH)</option><option value="踊り子">踊り子 (DNC)</option></optgroup><optgroup label="遠隔魔法"><option value="黒魔道士">黒魔道士 (BLM)</option><option value="召喚士">召喚士 (SMN)</option><option value="赤魔道士">赤魔道士 (RDM)</option><option value="ピクトマンサー">ピクトマンサー (PCT)</option></optgroup></select>
                    </div>
                </div>

                <div class="form-group">
                    <label id="lblPlaystyle">プレイスタイル (複数選択可)</label>
                    <div class="checkbox-grid" id="playstyleGrid">
                        <label class="checkbox-label"><input type="checkbox" name="style" value="ストーリー"><span>ストーリー</span></label>
                        <label class="checkbox-label"><input type="checkbox" name="style" value="雑談/RP"><span>雑談/RP</span></label>
                        <label class="checkbox-label"><input type="checkbox" name="style" value="ミラプリ"><span>ミラプリ</span></label>
                        <label class="checkbox-label"><input type="checkbox" name="style" value="ハウジング"><span>ハウジング</span></label>
                        <label class="checkbox-label"><input type="checkbox" name="style" value="SS撮影"><span>SS撮影</span></label>
                        <label class="checkbox-label"><input type="checkbox" name="style" value="PvP"><span>PvP</span></label>
                        <label class="checkbox-label"><input type="checkbox" name="style" value="ギャザクラ"><span>ギャザクラ</span></label>
                        <label class="checkbox-label"><input type="checkbox" name="style" value="レイド戦闘"><span>レイド戦闘</span></label>
                    </div>
                </div>

                <div class="form-group">
                    <label id="lblFavRace">好きな種族 (複数選択可)</label>
                    <div class="checkbox-grid" id="raceGrid">
                        <label class="checkbox-label"><input type="checkbox" name="race" value="Hyur"><span>ヒューラン</span></label>
                        <label class="checkbox-label"><input type="checkbox" name="race" value="Elezen"><span>エレゼン</span></label>
                        <label class="checkbox-label"><input type="checkbox" name="race" value="Lalafell"><span>ララフェル</span></label>
                        <label class="checkbox-label"><input type="checkbox" name="race" value="Miqo&#39;te"><span>ミコッテ</span></label>
                        <label class="checkbox-label"><input type="checkbox" name="race" value="Roegadyn"><span>ルガディン</span></label>
                        <label class="checkbox-label"><input type="checkbox" name="race" value="Au Ra"><span>アウラ</span></label>
                        <label class="checkbox-label"><input type="checkbox" name="race" value="Hrothgar"><span>ロスガル</span></label>
                        <label class="checkbox-label"><input type="checkbox" name="race" value="Viera"><span>ヴィエラ</span></label>
                    </div>
                </div>

                <div class="form-group">
                    <label id="lblProgress">メインストーリー進行度</label>
                    <div id="progressGroup" class="story-progress-grid"><label class="radio-label"><input type="radio" name="progress" value="0"><span>新生(2.X)</span></label><label class="radio-label"><input type="radio" name="progress" value="1"><span>蒼天(3.X)</span></label><label class="radio-label"><input type="radio" name="progress" value="2"><span>紅蓮(4.X)</span></label><label class="radio-label"><input type="radio" name="progress" value="3"><span>漆黒(5.X)</span></label><label class="radio-label"><input type="radio" name="progress" value="4"><span>暁月(6.X)</span></label><label class="radio-label"><input type="radio" name="progress" value="5"><span>黄金(7.X)</span></label></div>
                </div>

                <h3 class="section-title" id="lblLoginTime">Login Time :</h3>
                <div class="section">
                    <div class="form-group">

                    <label id="lblWeekday">平日</label>
                    <div id="weekdayTimeGrid" class="time-grid"></div>
                    </div>
                    <div class="form-group">
                    <label id="lblWeekend" >休日</label>
                    <div id="weekendTimeGrid" class="time-grid"></div>
                </div>

                <h3 class="section-title" id="lblLoginTime">Comment :</h3>
                <div class="form-group">
                    <label id="lblComment">裏面のコメント</label>
                    <div class="comment-container">
                        <textarea id="backComment" rows="5" placeholder="改行もできます！"></textarea>
                        <select id="textFontComment" class="comment-font-select">
                            <option class="font-hachimaru" value="'Hachi Maru Pop', sans-serif" selected>Hachi Maru Pop</option>
                            <option class="font-orbitron" value="'Orbitron', sans-serif">Orbitron</option>
                            <option class="font-cinzel" value="'Cinzel', serif">Cinzel</option>
                            <option class="font-cinzeldec" value="'Cinzel Decorative', serif">Cinzel Decorative</option>
                            <option class="font-montserrat" value="'Montserrat', sans-serif">Montserrat</option>
                            <option class="font-notojp" value="'Noto Sans JP', sans-serif">Noto Sans JP</option>
                            <option class="font-audiowide" value="'Audiowide', sans-serif">Audiowide</option>
                            <option class="font-blackhan" value="'Black Han Sans', sans-serif">Black Han Sans</option>
                            <option class="font-notable" value="'Notable', sans-serif">Notable</option>
                            <option class="font-gasoek" value="'Gasoek One', sans-serif">Gasoek One</option>
                            <option class="font-delagothic" value="'Dela Gothic One', sans-serif">Dela Gothic One</option>
                        </select>
                    </div>
                </div>
                </div>
            </div>

            <div class="preview-panel">
                <div class="neon-badge">FRONT PREVIEW :</div>
                <div class="preview-wrapper">
                    
                    <div class="preview-fit">
                        <div class="preview">
                            <canvas id="background-layer" width="1000" height="1545"></canvas>
                            <canvas id="ui-layer" width="1000" height="1545"></canvas>
                        </div>
                    </div>
                    <button class="save-btn" id="save-btn">Save image</button>
                    <!-- <div class="image-clip-container" id="frontClipBox"> -->
